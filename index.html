<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Name Picker Dice Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        
        h1 .dice-emoji {
            display: inline-block;
            animation: gentle-bounce 2s ease-in-out infinite;
        }
        
        @keyframes gentle-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .input-section {
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-add {
            background: #667eea;
            color: white;
        }

        .btn-add:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-start {
            background: #48bb78;
            color: white;
            width: 100%;
            padding: 20px;
            font-size: 20px;
            margin-top: 20px;
        }

        .btn-start:hover:not(:disabled) {
            background: #38a169;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(72, 187, 120, 0.4);
        }

        .btn-start:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
        }

        .btn-remove {
            background: #f56565;
            color: white;
            padding: 8px 15px;
            font-size: 14px;
        }

        .btn-remove:hover {
            background: #e53e3e;
        }

        .names-list {
            margin-bottom: 20px;
        }

        .names-list h3 {
            color: #4a5568;
            margin-bottom: 15px;
        }

        .name-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: #f7fafc;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }

        .name-item:hover {
            background: #edf2f7;
            transform: translateX(5px);
        }

        .name-text {
            font-size: 16px;
            color: #2d3748;
        }

        .roulette-section {
            text-align: center;
            margin-top: 30px;
            perspective: 1000px;
        }

        .dice-container {
            width: 200px;
            height: 200px;
            margin: 40px auto;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s;
        }

        .dice-container.rolling {
            animation: diceRoll 3s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes diceRoll {
            0% {
                transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg);
            }
            25% {
                transform: rotateX(360deg) rotateY(180deg) rotateZ(90deg);
            }
            50% {
                transform: rotateX(720deg) rotateY(360deg) rotateZ(180deg);
            }
            75% {
                transform: rotateX(1080deg) rotateY(540deg) rotateZ(270deg);
            }
            100% {
                transform: rotateX(1440deg) rotateY(720deg) rotateZ(360deg);
            }
        }

        .dice-face {
            position: absolute;
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #ffffff 0%, #f0f0f0 100%);
            border: 3px solid #667eea;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
            padding: 20px;
            word-wrap: break-word;
            text-align: center;
            box-shadow: inset 0 0 20px rgba(102, 126, 234, 0.1),
                        0 10px 30px rgba(0, 0, 0, 0.3);
            backface-visibility: visible;
        }

        .dice-face::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 15px;
            width: 30px;
            height: 30px;
            background: #667eea;
            border-radius: 50%;
            opacity: 0.3;
        }

        .dice-face::after {
            content: '';
            position: absolute;
            bottom: 15px;
            right: 15px;
            width: 30px;
            height: 30px;
            background: #667eea;
            border-radius: 50%;
            opacity: 0.3;
        }

        .dice-face.front {
            transform: rotateY(0deg) translateZ(100px);
        }

        .dice-face.back {
            transform: rotateY(180deg) translateZ(100px);
        }

        .dice-face.right {
            transform: rotateY(90deg) translateZ(100px);
        }

        .dice-face.left {
            transform: rotateY(-90deg) translateZ(100px);
        }

        .dice-face.top {
            transform: rotateX(90deg) translateZ(100px);
        }

        .dice-face.bottom {
            transform: rotateX(-90deg) translateZ(100px);
        }

        .dice-content {
            position: relative;
            z-index: 1;
            max-width: 150px;
            overflow-wrap: break-word;
        }

        .winner-announcement {
            margin-top: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            border-radius: 15px;
            display: none;
        }

        .winner-announcement.show {
            display: block;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .winner-announcement h2 {
            color: #744210;
            margin-bottom: 10px;
        }

        .winner-name {
            font-size: 32px;
            font-weight: bold;
            color: #744210;
        }

        .empty-message {
            text-align: center;
            color: #a0aec0;
            padding: 20px;
            font-style: italic;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 2em;
            }

            .dice-container {
                width: 150px;
                height: 150px;
            }

            .dice-face {
                width: 150px;
                height: 150px;
                font-size: 16px;
            }

            .dice-face.front {
                transform: rotateY(0deg) translateZ(75px);
            }

            .dice-face.back {
                transform: rotateY(180deg) translateZ(75px);
            }

            .dice-face.right {
                transform: rotateY(90deg) translateZ(75px);
            }

            .dice-face.left {
                transform: rotateY(-90deg) translateZ(75px);
            }

            .dice-face.top {
                transform: rotateX(90deg) translateZ(75px);
            }

            .dice-face.bottom {
                transform: rotateX(-90deg) translateZ(75px);
            }

            .dice-content {
                max-width: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><span class="dice-emoji">🎲</span> Name Picker Dice</h1>
        
        <div class="input-section">
            <div class="input-group">
                <input 
                    type="text" 
                    id="nameInput" 
                    placeholder="Masukkan nama..." 
                    onkeypress="if(event.key === 'Enter') addName()"
                >
                <button class="btn-add" onclick="addName()">Tambah</button>
            </div>
        </div>

        <div class="names-list">
            <h3>Daftar Nama (<span id="nameCount">0</span>)</h3>
            <div id="namesList"></div>
        </div>

        <button class="btn-start" id="startBtn" onclick="startDiceRoll()" disabled>
            🎲 Lempar Dadu
        </button>

        <div class="roulette-section">
            <div class="dice-container" id="diceContainer">
                <div class="dice-face front">
                    <div class="dice-content" id="diceFront">Siap!</div>
                </div>
                <div class="dice-face back">
                    <div class="dice-content" id="diceBack">🎲</div>
                </div>
                <div class="dice-face right">
                    <div class="dice-content" id="diceRight">🎲</div>
                </div>
                <div class="dice-face left">
                    <div class="dice-content" id="diceLeft">🎲</div>
                </div>
                <div class="dice-face top">
                    <div class="dice-content" id="diceTop">🎲</div>
                </div>
                <div class="dice-face bottom">
                    <div class="dice-content" id="diceBottom">🎲</div>
                </div>
            </div>
        </div>

        <div class="winner-announcement" id="winnerAnnouncement">
            <h2>🎉 Pemenangnya adalah:</h2>
            <div class="winner-name" id="winnerName"></div>
        </div>
    </div>

    <script>
        let names = [];
        let isSpinning = false;

        function updateNamesList() {
            const namesList = document.getElementById('namesList');
            const nameCount = document.getElementById('nameCount');
            const startBtn = document.getElementById('startBtn');
            
            nameCount.textContent = names.length;
            
            if (names.length === 0) {
                namesList.innerHTML = '<div class="empty-message">Belum ada nama. Tambahkan nama terlebih dahulu.</div>';
                startBtn.disabled = true;
            } else {
                namesList.innerHTML = names.map((name, index) => `
                    <div class="name-item">
                        <span class="name-text">${name}</span>
                        <button class="btn-remove" onclick="removeName(${index})">Hapus</button>
                    </div>
                `).join('');
                startBtn.disabled = false;
            }
        }

        function addName() {
            const input = document.getElementById('nameInput');
            const name = input.value.trim();
            
            if (name === '') {
                alert('Nama tidak boleh kosong!');
                return;
            }
            
            if (names.includes(name)) {
                alert('Nama sudah ada dalam daftar!');
                return;
            }
            
            names.push(name);
            input.value = '';
            input.focus();
            updateNamesList();
            hideWinner();
        }

        function removeName(index) {
            names.splice(index, 1);
            updateNamesList();
            hideWinner();
        }

        function hideWinner() {
            document.getElementById('winnerAnnouncement').classList.remove('show');
        }

        function startDiceRoll() {
            if (isSpinning || names.length === 0) {
                return;
            }
            
            isSpinning = true;
            const startBtn = document.getElementById('startBtn');
            const diceContainer = document.getElementById('diceContainer');
            const diceFaces = {
                front: document.getElementById('diceFront'),
                back: document.getElementById('diceBack'),
                right: document.getElementById('diceRight'),
                left: document.getElementById('diceLeft'),
                top: document.getElementById('diceTop'),
                bottom: document.getElementById('diceBottom')
            };
            const winnerAnnouncement = document.getElementById('winnerAnnouncement');
            const winnerName = document.getElementById('winnerName');
            
            startBtn.disabled = true;
            winnerAnnouncement.classList.remove('show');
            
            // Show random names on all faces while rolling
            let spinInterval;
            diceContainer.classList.add('rolling');
            
            spinInterval = setInterval(() => {
                Object.values(diceFaces).forEach(face => {
                    const randomIndex = Math.floor(Math.random() * names.length);
                    face.textContent = names[randomIndex];
                });
            }, 100);
            
            // Stop after 3 seconds and show winner
            setTimeout(() => {
                clearInterval(spinInterval);
                diceContainer.classList.remove('rolling');
                
                // Select final winner
                const winnerIndex = Math.floor(Math.random() * names.length);
                const winner = names[winnerIndex];
                
                setTimeout(() => {
                    // Show winner on the front face
                    diceFaces.front.textContent = winner;
                    // Show random names on other faces
                    Object.entries(diceFaces).forEach(([key, face]) => {
                        if (key !== 'front') {
                            const randomIndex = Math.floor(Math.random() * names.length);
                            face.textContent = names[randomIndex];
                        }
                    });
                    
                    winnerName.textContent = winner;
                    winnerAnnouncement.classList.add('show');
                    
                    isSpinning = false;
                    startBtn.disabled = false;
                }, 500);
            }, 3000);
        }

        // Initialize
        updateNamesList();
    </script>
</body>
</html>
